# iOS Simulator セッションを張る workflow。
# 起動例:
#   gh workflow run simulator-session.yml -f session=dev -f duration_minutes=60
# 停止:
#   gh run cancel <run-id> -R bannzai/simtunnel
name: simulator-session
run-name: "session=${{ inputs.session }} device=${{ inputs.device }}"

on:
  workflow_dispatch:
    inputs:
      session:
        description: "セッション名。tailnet ホスト名 simtunnel-<session> になる（小文字英数字とハイフンのみ）"
        required: true
        default: dev
      device:
        description: "Simulator のデバイス名"
        required: true
        default: iPhone 17
      duration_minutes:
        description: "セッション維持時間（分）"
        required: true
        default: "60"
      app_zip_url:
        description: "Simulator 用 .app を zip した URL（省略時は install しない）"
        required: false
        default: ""
      bundle_id:
        description: "install 後に launch する bundle id（省略時は launch しない）"
        required: false
        default: ""
      sample_app:
        description: "リポジトリ内のサンプルアプリ (iOSProject) をビルドして launch する"
        required: false
        default: "true"
      serve_sim:
        description: "serve-sim を起動する（ブラウザから見る・操作する preview UI :3200 / stream :3100）"
        required: false
        default: "true"

permissions:
  id-token: write # Tailscale の OIDC (workload identity federation) 認証に必要
  contents: read

env:
  # WebDriverAgent のバージョン固定（ビルドキャッシュのキーにもなる）
  WDA_REF: v15.1.3

# 同名セッションの同時起動を防ぐ（tailnet ホスト名の衝突防止）
concurrency:
  group: simulator-session-${{ github.event.inputs.session }}
  cancel-in-progress: false

jobs:
  session:
    # サンプルアプリ (iOSProject) の deployment target が iOS 26.x のため macos-26 (Xcode 26.5)
    runs-on: macos-26
    # 各 step が個別に時間制限を持つため、これは暴走時の最終防衛線
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: セッション名を検証
        env:
          SESSION: ${{ github.event.inputs.session }}
        run: |
          [[ "$SESSION" =~ ^[a-z0-9-]+$ ]] || {
            echo "session は小文字英数字とハイフンのみ許可: $SESSION" >&2
            exit 1
          }

      - name: Xcode バージョンを取得（キャッシュキー用）
        id: xcode
        run: echo "version=$(xcodebuild -version | tr '\n' '_' | tr ' ' '.')" >> "$GITHUB_OUTPUT"

      - name: WDA ビルドキャッシュを復元
        id: wda-cache
        uses: actions/cache/restore@v4
        with:
          path: wda-dd/Build/Products
          key: wda-${{ env.WDA_REF }}-${{ runner.arch }}-${{ steps.xcode.outputs.version }}

      - name: Simulator を起動
        timeout-minutes: 15
        env:
          DEVICE: ${{ github.event.inputs.device }}
        run: ./runner/boot-simulator.sh "$DEVICE"

      - name: アプリを install / launch
        timeout-minutes: 10
        env:
          APP_ZIP_URL: ${{ github.event.inputs.app_zip_url }}
          BUNDLE_ID: ${{ github.event.inputs.bundle_id }}
        run: ./runner/install-app.sh

      - name: サンプルアプリをビルドして install / launch
        if: github.event.inputs.sample_app == 'true'
        timeout-minutes: 15
        run: ./runner/build-sample-app.sh

      - name: WebDriverAgent を起動
        timeout-minutes: 20
        run: ./runner/start-wda.sh "$SIMULATOR_UDID"

      - name: serve-sim を起動
        if: github.event.inputs.serve_sim == 'true'
        timeout-minutes: 10
        run: ./runner/start-serve-sim.sh "$SIMULATOR_UDID"

      # キャッシュミス時のみ保存する。ジョブは down で cancel されるため、
      # post step 任せにせずビルド直後に明示的に保存する
      - name: WDA ビルドキャッシュを保存
        if: steps.wda-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: wda-dd/Build/Products
          key: wda-${{ env.WDA_REF }}-${{ runner.arch }}-${{ steps.xcode.outputs.version }}

      # ここまで（WDA がローカルで応答するまで）tailnet に参加しない。
      # 参照: PROJECT.md「リポジトリ公開に耐える安全性」
      - name: Tailscale に参加
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          audience: ${{ secrets.TS_OIDC_AUDIENCE }}
          tags: tag:ci
          hostname: simtunnel-${{ github.event.inputs.session }}

      # serve-sim は preview UI とストリーム (/helper/<UDID>/stream.mjpeg) をどちらも :3200 で配信するため 3200 のみ公開する
      - name: tailnet へブリッジ
        timeout-minutes: 10
        env:
          EXTRA_PORTS: ${{ github.event.inputs.serve_sim == 'true' && '3200' || '' }}
        run: ./runner/bridge.sh 8100 9100 $EXTRA_PORTS

      - name: セッション情報を出力
        env:
          SESSION: ${{ github.event.inputs.session }}
          SERVE_SIM: ${{ github.event.inputs.serve_sim }}
        run: |
          TS_IP="$(tailscale ip -4 | head -1)"
          {
            echo "## SimTunnel session ready"
            echo ""
            echo "- hostname: \`simtunnel-${SESSION}\`"
            echo "- tailscale IP: \`${TS_IP}\`"
            echo "- WDA: http://simtunnel-${SESSION}:8100/status"
            echo "- MJPEG: http://simtunnel-${SESSION}:9100"
            if [ "$SERVE_SIM" = "true" ]; then
              echo "- preview UI（ブラウザ操作）: http://simtunnel-${SESSION}:3200"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: セッションを維持
        env:
          DURATION: ${{ github.event.inputs.duration_minutes }}
        run: ./runner/keepalive.sh "$DURATION"
