# iOS Simulator セッションを張る workflow（simtunnel 自身用の workflow_dispatch ラッパー）。
# 実体は session.yml（reusable workflow）。他リポジトリからの利用は PROJECT.md「各アプリ repo での実行」参照。
# 起動例:
#   gh workflow run simulator-session.yml -f session=dev -f duration_minutes=60
# 停止:
#   gh run cancel <run-id> -R bannzai/simtunnel
name: simulator-session
run-name: "session=${{ inputs.session }} device=${{ inputs.device }}"

on:
  workflow_dispatch:
    inputs:
      session:
        description: "セッション名。tailnet ホスト名 simtunnel-<session> になる（小文字英数字とハイフンのみ）"
        required: true
        default: dev
      device:
        description: "Simulator のデバイス名"
        required: true
        default: iPhone 17
      duration_minutes:
        description: "セッション維持時間（分）"
        required: true
        default: "60"
      simulators:
        description: "起動する Simulator の台数（i 台目は WDA :8100+i / MJPEG :9100+i）"
        required: false
        default: "1"
      app_zip_url:
        description: "Simulator 用 .app を zip した URL（省略時は install しない）"
        required: false
        default: ""
      bundle_id:
        description: "install 後に launch する bundle id（省略時は launch しない）"
        required: false
        default: ""
      sample_app:
        description: "リポジトリ内のサンプルアプリ (iOSProject) をビルドして launch する"
        required: false
        default: "true"
      serve_sim:
        description: "serve-sim を起動する（ブラウザから見る・操作する preview UI :3200 / stream :3100）"
        required: false
        default: "true"

jobs:
  session:
    # id-token: write が必要なのは reusable workflow を呼ぶこの job だけのため、job 単位で最小権限にする
    permissions:
      id-token: write # Tailscale の OIDC (workload identity federation) 認証に必要
      contents: read
    uses: ./.github/workflows/session.yml
    with:
      session: ${{ inputs.session }}
      device: ${{ inputs.device }}
      duration_minutes: ${{ inputs.duration_minutes }}
      simulators: ${{ inputs.simulators }}
      app_zip_url: ${{ inputs.app_zip_url }}
      bundle_id: ${{ inputs.bundle_id }}
      build_project: ${{ inputs.sample_app == 'true' && 'iOSProject/iOSProject.xcodeproj' || '' }}
      build_scheme: ${{ inputs.sample_app == 'true' && 'iOSProject' || '' }}
      serve_sim: ${{ inputs.serve_sim }}
    secrets:
      TS_OIDC_CLIENT_ID: ${{ secrets.TS_OIDC_CLIENT_ID }}
      TS_OIDC_AUDIENCE: ${{ secrets.TS_OIDC_AUDIENCE }}
