# iOS Simulator + WDA セッションを張る reusable workflow。
# 他リポジトリからの呼び方（caller workflow の例）は PROJECT.md「各アプリ repo での実行」参照。
# simtunnel 自身は simulator-session.yml（workflow_dispatch ラッパー）経由で呼ぶ。
name: session

on:
  workflow_call:
    inputs:
      session:
        description: "セッション名。tailnet ホスト名 simtunnel-<session> になる（小文字英数字とハイフンのみ）"
        type: string
        required: true
      device:
        description: "Simulator のデバイス名"
        type: string
        required: false
        default: iPhone 17
      simulators:
        description: "起動する Simulator の台数。i 台目 (0 始まり) は WDA :8100+i / MJPEG :9100+i（メモリ制約があるため 2〜3 台まで推奨）"
        type: string
        required: false
        default: "1"
      duration_minutes:
        description: "セッション維持時間（分）"
        type: string
        required: false
        default: "60"
      app_zip_url:
        description: "Simulator 用 .app を zip した URL（省略時は install しない）"
        type: string
        required: false
        default: ""
      bundle_id:
        description: "install 後に launch する bundle id（省略時は launch しない）"
        type: string
        required: false
        default: ""
      app_artifact:
        description: "同一 run 内でアップロード済みの Simulator 用 .app が入った artifact 名（空なら install しない。caller の build job でビルドして渡す）"
        type: string
        required: false
        default: ""
      build_project:
        description: "runner 上でビルドする .xcodeproj / .xcworkspace のパス（caller リポジトリのルート相対。空ならビルドしない）"
        type: string
        required: false
        default: ""
      build_scheme:
        description: "build_project をビルドする scheme（build_project 指定時は必須）"
        type: string
        required: false
        default: ""
      build_configuration:
        description: "build_project をビルドする configuration"
        type: string
        required: false
        default: Debug
      serve_sim:
        description: "serve-sim を起動する（ブラウザから見る・操作する preview UI :3200 / stream :3100）"
        type: string
        required: false
        default: "true"
    secrets:
      TS_OIDC_CLIENT_ID:
        required: true
      TS_OIDC_AUDIENCE:
        required: true

env:
  # WebDriverAgent のバージョン固定（ビルドキャッシュのキーにもなる）
  WDA_REF: v15.1.3

jobs:
  session:
    # サンプルアプリ (iOSProject) の deployment target が iOS 26.x のため macos-26 (Xcode 26.5)
    runs-on: macos-26
    # 各 step が個別に時間制限を持つため、これは暴走時の最終防衛線
    timeout-minutes: 360
    # caller が付与した権限を必要最小限まで絞る（Tailscale の OIDC 認証に id-token: write が必要）
    permissions:
      id-token: write
      contents: read
    # 同名セッションの同時起動を防ぐ（tailnet ホスト名の衝突防止）。
    # グループは caller リポジトリ単位のため、repo を跨いだ同名セッションは防げない
    # （参照: PROJECT.md「未検証事項・リスク」）
    concurrency:
      group: simulator-session-${{ inputs.session }}
      cancel-in-progress: false
    steps:
      - name: 入力を検証
        env:
          SESSION: ${{ inputs.session }}
          BUILD_PROJECT: ${{ inputs.build_project }}
          BUILD_SCHEME: ${{ inputs.build_scheme }}
          SIMULATORS: ${{ inputs.simulators }}
          JOB_WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          [[ "$SESSION" =~ ^[a-z0-9-]+$ ]] || {
            echo "session は小文字英数字とハイフンのみ許可: $SESSION" >&2
            exit 1
          }
          [[ "$SIMULATORS" =~ ^[0-9]+$ ]] && [ "$SIMULATORS" -ge 1 ] && [ "$SIMULATORS" -le 4 ] || {
            echo "simulators は 1〜4 の整数: $SIMULATORS" >&2
            exit 1
          }
          if [ -n "$BUILD_PROJECT" ] && [ -z "$BUILD_SCHEME" ]; then
            echo "build_project 指定時は build_scheme も必須" >&2
            exit 1
          fi
          # 空だと simtunnel の checkout がデフォルトブランチに落ちて workflow と scripts の版がずれる
          [ -n "$JOB_WORKFLOW_SHA" ] || {
            echo "job.workflow_sha が空。runner スクリプトの版を固定できないため中断" >&2
            exit 1
          }

      # タグは可変で差し替えられうるため commit SHA で固定する（参照: PROJECT.md「リポジトリ公開に耐える安全性」）
      # checkout 後に git 認証は使わないため token を .git/config に残さない（xcodebuild の build phase 等からの読み出し防止）
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # runner スクリプトは caller リポジトリには無いため、この workflow ファイルと同一 repo・同一 commit を取得する
      # （job.workflow_sha / job.workflow_repository は reusable workflow では呼ばれた workflow ファイルを指す）
      - name: simtunnel（runner スクリプト）を checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: simtunnel
          persist-credentials: false

      - name: Xcode バージョンを取得（キャッシュキー用）
        id: xcode
        run: echo "version=$(xcodebuild -version | tr '\n' '_' | tr ' ' '.')" >> "$GITHUB_OUTPUT"

      - name: WDA ビルドキャッシュを復元
        id: wda-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: wda-dd/Build/Products
          key: wda-${{ env.WDA_REF }}-${{ runner.arch }}-${{ steps.xcode.outputs.version }}

      - name: Simulator を起動
        timeout-minutes: 15
        env:
          DEVICE: ${{ inputs.device }}
          SIMULATORS: ${{ inputs.simulators }}
        run: ./simtunnel/runner/boot-simulator.sh "$DEVICE" "$SIMULATORS"

      - name: アプリを install / launch
        timeout-minutes: 10
        env:
          APP_ZIP_URL: ${{ inputs.app_zip_url }}
          BUNDLE_ID: ${{ inputs.bundle_id }}
        run: ./simtunnel/runner/install-app.sh

      # caller の build job がアップロードした .app（同一 run の artifact）を install する経路。
      # runner 間の転送は GitHub 内部で完結するため DERP 帯域の制約を受けない
      - name: artifact のアプリをダウンロード
        if: inputs.app_artifact != ''
        timeout-minutes: 10
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: ${{ inputs.app_artifact }}
          path: artifact-app

      - name: artifact のアプリを install / launch
        if: inputs.app_artifact != ''
        timeout-minutes: 10
        env:
          APP_DIR: artifact-app
        run: ./simtunnel/runner/install-artifact-app.sh

      - name: アプリをビルドして install / launch
        if: inputs.build_project != ''
        timeout-minutes: 30
        env:
          BUILD_PROJECT: ${{ inputs.build_project }}
          BUILD_SCHEME: ${{ inputs.build_scheme }}
          BUILD_CONFIGURATION: ${{ inputs.build_configuration }}
        run: ./simtunnel/runner/build-app.sh

      - name: WebDriverAgent を起動
        timeout-minutes: 30
        run: ./simtunnel/runner/start-wda.sh $SIMULATOR_UDIDS

      - name: serve-sim を起動
        if: inputs.serve_sim == 'true'
        timeout-minutes: 10
        run: ./simtunnel/runner/start-serve-sim.sh "$SIMULATOR_UDID"

      # キャッシュミス時のみ保存する。ジョブは down で cancel されるため、
      # post step 任せにせずビルド直後に明示的に保存する
      - name: WDA ビルドキャッシュを保存
        if: steps.wda-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: wda-dd/Build/Products
          key: wda-${{ env.WDA_REF }}-${{ runner.arch }}-${{ steps.xcode.outputs.version }}

      # ここまで（WDA がローカルで応答するまで）tailnet に参加しない。
      # 参照: PROJECT.md「リポジトリ公開に耐える安全性」
      - name: Tailscale に参加
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          audience: ${{ secrets.TS_OIDC_AUDIENCE }}
          tags: tag:ci
          hostname: simtunnel-${{ inputs.session }}

      # serve-sim は preview UI とストリーム (/helper/<UDID>/stream.mjpeg) をどちらも :3200 で配信するため 3200 のみ公開する
      - name: tailnet へブリッジ
        timeout-minutes: 10
        env:
          SIMULATORS: ${{ inputs.simulators }}
          EXTRA_PORTS: ${{ inputs.serve_sim == 'true' && '3200' || '' }}
        run: |
          PORTS=""
          for i in $(seq 0 $((SIMULATORS - 1))); do PORTS="$PORTS $((8100 + i)) $((9100 + i))"; done
          ./simtunnel/runner/bridge.sh $PORTS $EXTRA_PORTS

      - name: セッション情報を出力
        env:
          SESSION: ${{ inputs.session }}
          SERVE_SIM: ${{ inputs.serve_sim }}
          SIMULATORS: ${{ inputs.simulators }}
        run: |
          TS_IP="$(tailscale ip -4 | head -1)"
          {
            echo "## SimTunnel session ready"
            echo ""
            echo "- hostname: \`simtunnel-${SESSION}\`"
            echo "- tailscale IP: \`${TS_IP}\`"
            for i in $(seq 0 $((SIMULATORS - 1))); do
              echo "- sim ${i}: WDA http://simtunnel-${SESSION}:$((8100 + i))/status / MJPEG http://simtunnel-${SESSION}:$((9100 + i))"
            done
            if [ "$SERVE_SIM" = "true" ]; then
              echo "- preview UI（ブラウザ操作 / sim 0）: http://simtunnel-${SESSION}:3200"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: セッションを維持
        env:
          DURATION: ${{ inputs.duration_minutes }}
          SIMULATORS: ${{ inputs.simulators }}
        run: |
          PORTS=""
          for i in $(seq 0 $((SIMULATORS - 1))); do PORTS="$PORTS $((8100 + i))"; done
          ./simtunnel/runner/keepalive.sh "$DURATION" $PORTS
